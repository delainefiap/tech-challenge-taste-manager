spring.application.name=tastemanager

# MySQL (para Docker Compose)
spring.datasource.url=jdbc:mysql://mysql:3306/tastemanager
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=tastemanager
spring.datasource.password=tastemanager
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Ensure Spring's SQL initialization runs on startup and picks up import.sql from mounted resources folder
spring.sql.init.mode=always
# Prefer the file mounted by docker-compose so we can edit import.sql without rebuilding the image
spring.sql.init.data-locations=file:/app/resources/import.sql
spring.sql.init.encoding=UTF-8

# Disable Hibernate's classpath import.sql processing (we use Spring's initializer instead)
spring.jpa.properties.hibernate.hbm2ddl.import_files=

#logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/tastemanager.log

# Jackson
spring.jackson.time-zone=America/Sao_Paulo
