spring.application.name=tastemanager

# MySQL (para Docker Compose)
spring.datasource.url=jdbc:mysql://mysql:3306/tastemanager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=tastemanager
spring.datasource.password=tastemanager
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/tastemanager.log